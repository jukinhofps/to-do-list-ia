<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Tarefas - Projeto Faculdade</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

        :root {
            --primary: #4f46e5;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f8fafc, #e0e7ff);
            min-height: 100vh;
            padding: 2rem 1rem;
            color: #1e2937;
        }

        .container {
            max-width: 700px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1),
                        0 8px 10px -6px rgb(0 0 0 / 0.1);
            overflow: hidden;
        }

        header {
            background: var(--primary);
            color: white;
            padding: 2rem 2rem 1.5rem;
            text-align: center;
        }

        header h1 {
            font-size: 2.2rem;
            font-weight: 600;
            margin-bottom: 0.3rem;
        }

        header p {
            opacity: 0.9;
            font-size: 1.1rem;
        }

        .form-container {
            padding: 2rem;
            background: #f8fafc;
            border-bottom: 1px solid #e2e8f0;
        }

        .form-group {
            display: flex;
            gap: 1rem;
            align-items: end;
        }

        .input-wrapper {
            flex: 1;
        }

        label {
            display: block;
            margin-bottom: 0.4rem;
            font-size: 0.95rem;
            font-weight: 500;
            color: #475569;
        }

        input[type="text"] {
            width: 100%;
            padding: 14px 16px;
            font-size: 1.1rem;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            outline: none;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.15);
        }

        select {
            padding: 14px 16px;
            font-size: 1.1rem;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            background: white;
            outline: none;
            cursor: pointer;
            min-width: 160px;
        }

        .btn-add {
            padding: 14px 28px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px -1px rgb(79 70 229 / 0.2);
        }

        .btn-add:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgb(79 70 229 / 0.3);
        }

        .task-list {
            list-style: none;
            max-height: 500px;
            overflow-y: auto;
            padding: 1rem 2rem 2rem;
        }

        .task-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1.2rem 1.5rem;
            background: white;
            border-radius: 16px;
            margin-bottom: 0.8rem;
            box-shadow: 0 2px 4px rgb(0 0 0 / 0.05);
            transition: all 0.3s ease;
            border-left: 6px solid transparent;
        }

        .task-item:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1);
        }

        /* Estilização condicional por prioridade */
        .task-item.alta {
            border-left-color: #ef4444;
        }
        .task-item.media {
            border-left-color: #f59e0b;
        }
        .task-item.baixa {
            border-left-color: #10b981;
        }

        .done-checkbox {
            width: 24px;
            height: 24px;
            accent-color: var(--primary);
            cursor: pointer;
        }

        .task-text {
            flex: 1;
            font-size: 1.1rem;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .task-item.done .task-text {
            text-decoration: line-through;
            color: #64748b;
            opacity: 0.75;
        }

        .priority-badge {
            padding: 4px 14px;
            border-radius: 9999px;
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            white-space: nowrap;
        }

        .priority-alta { background: #ef4444; color: white; }
        .priority-media { background: #f59e0b; color: #1e2937; }
        .priority-baixa { background: #10b981; color: white; }

        .delete-btn {
            background: #f1f5f9;
            color: #64748b;
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .delete-btn:hover {
            background: #fee2e2;
            color: #ef4444;
            transform: scale(1.1);
        }

        .empty-state {
            text-align: center;
            padding: 3rem 2rem;
            color: #64748b;
        }

        .empty-state img {
            width: 120px;
            opacity: 0.3;
            margin-bottom: 1rem;
        }

        footer {
            text-align: center;
            padding: 1.5rem;
            font-size: 0.9rem;
            color: #64748b;
            border-top: 1px solid #e2e8f0;
        }

        /* Scrollbar customizada */
        .task-list::-webkit-scrollbar {
            width: 8px;
        }
        .task-list::-webkit-scrollbar-thumb {
            background: #c1d0e0;
            border-radius: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📋 Lista de Tarefas</h1>
            <p>Organize suas tarefas com prioridade • Projeto Faculdade</p>
        </header>

        <!-- Campo de Entrada + Seletor de Prioridade -->
        <div class="form-container">
            <div class="form-group">
                <div class="input-wrapper">
                    <label for="task-input">Descrição da tarefa</label>
                    <input type="text" id="task-input" placeholder="Ex: Estudar para a prova de Matemática" autocomplete="off">
                </div>
                
                <div>
                    <label for="priority-select">Prioridade</label>
                    <select id="priority-select">
                        <option value="alta">🔴 Alta</option>
                        <option value="media" selected>🟠 Média</option>
                        <option value="baixa">🟢 Baixa</option>
                    </select>
                </div>

                <button id="add-btn" class="btn-add">+ Adicionar</button>
            </div>
        </div>

        <!-- Lista de Exibição -->
        <ul id="task-list" class="task-list">
            <!-- As tarefas são inseridas aqui via JavaScript -->
        </ul>

        <footer>
            Total de tarefas: <span id="task-count">0</span>
        </footer>
    </div>

    <script>
        // =============== VARIÁVEIS GLOBAIS ===============
        let tasks = [];

        // =============== ELEMENTOS DO DOM ===============
        const taskInput = document.getElementById('task-input');
        const prioritySelect = document.getElementById('priority-select');
        const addBtn = document.getElementById('add-btn');
        const taskList = document.getElementById('task-list');
        const taskCount = document.getElementById('task-count');

        // =============== FUNÇÃO PARA SALVAR NO LOCALSTORAGE ===============
        function saveToLocalStorage() {
            localStorage.setItem('collegeTodoTasks', JSON.stringify(tasks));
        }

        // =============== FUNÇÃO PARA CARREGAR DO LOCALSTORAGE ===============
        function loadFromLocalStorage() {
            const savedTasks = localStorage.getItem('collegeTodoTasks');
            if (savedTasks) {
                tasks = JSON.parse(savedTasks);
                renderTasks();
            }
        }

        // =============== FUNÇÃO PARA RENDERIZAR TODAS AS TAREFAS ===============
        function renderTasks() {
            taskList.innerHTML = '';

            if (tasks.length === 0) {
                taskList.innerHTML = `
                    <div class="empty-state">
                        <p style="font-size: 1.3rem; margin-bottom: 0.5rem;">🎯</p>
                        <p>Nenhuma tarefa ainda...</p>
                        <p style="font-size: 0.95rem; margin-top: 0.5rem;">Adicione sua primeira tarefa acima!</p>
                    </div>
                `;
                taskCount.textContent = '0';
                return;
            }

            tasks.forEach((task, index) => {
                const li = document.createElement('li');
                li.className = `task-item ${task.priority} ${task.done ? 'done' : ''}`;
                
                li.innerHTML = `
                    <input type="checkbox" class="done-checkbox" ${task.done ? 'checked' : ''}>
                    <span class="task-text">${task.text}</span>
                    <span class="priority-badge priority-${task.priority}">
                        ${task.priority === 'alta' ? 'Alta' : task.priority === 'media' ? 'Média' : 'Baixa'}
                    </span>
                    <button class="delete-btn" title="Excluir tarefa">🗑️</button>
                `;

                // Evento de marcar como concluída
                const checkbox = li.querySelector('.done-checkbox');
                checkbox.addEventListener('change', () => {
                    tasks[index].done = checkbox.checked;
                    saveToLocalStorage();
                    renderTasks();
                });

                // Evento de excluir
                const deleteBtn = li.querySelector('.delete-btn');
                deleteBtn.addEventListener('click', () => {
                    tasks.splice(index, 1);
                    saveToLocalStorage();
                    renderTasks();
                });

                taskList.appendChild(li);
            });

            taskCount.textContent = tasks.length;
        }

        // =============== FUNÇÃO PARA ADICIONAR NOVA TAREFA ===============
        function addTask() {
            const text = taskInput.value.trim();
            
            if (text === '') {
                taskInput.style.borderColor = '#ef4444';
                setTimeout(() => {
                    taskInput.style.borderColor = '';
                }, 800);
                return;
            }

            const newTask = {
                id: Date.now(),
                text: text,
                priority: prioritySelect.value,
                done: false
            };

            tasks.unshift(newTask); // adiciona no início
            saveToLocalStorage();
            renderTasks();

            // Limpa o campo
            taskInput.value = '';
            
            // Feedback visual
            const originalText = addBtn.textContent;
            addBtn.textContent = '✅ Adicionado!';
            addBtn.style.background = '#10b981';
            setTimeout(() => {
                addBtn.textContent = originalText;
                addBtn.style.background = '';
            }, 1200);
        }

        // =============== EVENTOS ===============
        addBtn.addEventListener('click', addTask);

        // Permitir adicionar com tecla Enter
        taskInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                addTask();
            }
        });

        // Carregar tarefas ao iniciar a página
        window.addEventListener('load', () => {
            loadFromLocalStorage();
        });
    </script>
</body>
</html>
