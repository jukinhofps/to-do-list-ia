<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Tarefas - Projeto Faculdade</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

        :root {
            --primary: #4f46e5;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f8fafc, #e0e7ff);
            min-height: 100vh;
            color: #1e2937;
            padding: 1rem 0.8rem; /* menor padding no mobile */
        }

        .container {
            max-width: 700px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 25px -5px rgb(0 0 0 / 0.1),
                        0 8px 10px -6px rgb(0 0 0 / 0.1);
            overflow: hidden;
        }

        header {
            background: var(--primary);
            color: white;
            padding: 1.8rem 1.5rem 1.4rem;
            text-align: center;
        }

        header h1 {
            font-size: 1.9rem;
            font-weight: 600;
        }

        header p {
            opacity: 0.9;
            font-size: 1rem;
            margin-top: 0.3rem;
        }

        .form-container {
            padding: 1.8rem 1.5rem;
            background: #f8fafc;
            border-bottom: 1px solid #e2e8f0;
        }

        .form-group {
            display: flex;
            flex-direction: column;     /* empilha no mobile */
            gap: 1rem;
        }

        .input-wrapper {
            flex: 1;
        }

        label {
            display: block;
            margin-bottom: 0.4rem;
            font-size: 0.95rem;
            font-weight: 500;
            color: #475569;
        }

        input[type="text"] {
            width: 100%;
            padding: 14px 16px;
            font-size: 1.1rem;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            outline: none;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.15);
        }

        select {
            width: 100%;
            padding: 14px 16px;
            font-size: 1.1rem;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            background: white;
            outline: none;
            cursor: pointer;
        }

        .btn-add {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.15rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 0.5rem;
        }

        .btn-add:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgb(79 70 229 / 0.3);
        }

        .task-list {
            list-style: none;
            max-height: 65vh;           /* melhor altura em mobile */
            overflow-y: auto;
            padding: 1rem 1.5rem 1.5rem;
        }

        .task-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 1.1rem 1.3rem;
            background: white;
            border-radius: 16px;
            margin-bottom: 0.8rem;
            box-shadow: 0 2px 6px rgb(0 0 0 / 0.06);
            transition: all 0.3s ease;
            border-left: 6px solid transparent;
        }

        .task-item:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 15px -3px rgb(0 0 0 / 0.1);
        }

        /* Estilização condicional por prioridade */
        .task-item.alta  { border-left-color: #ef4444; }
        .task-item.media { border-left-color: #f59e0b; }
        .task-item.baixa { border-left-color: #10b981; }

        .done-checkbox {
            width: 26px;
            height: 26px;
            accent-color: var(--primary);
            cursor: pointer;
            flex-shrink: 0;
        }

        .task-text {
            flex: 1;
            font-size: 1.08rem;
            line-height: 1.4;
            word-break: break-word; /* quebra palavras longas */
        }

        .task-item.done .task-text {
            text-decoration: line-through;
            color: #64748b;
            opacity: 0.8;
        }

        .priority-badge {
            padding: 5px 12px;
            border-radius: 9999px;
            font-size: 0.82rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .priority-alta  { background: #ef4444; color: white; }
        .priority-media { background: #f59e0b; color: #1e2937; }
        .priority-baixa { background: #10b981; color: white; }

        .delete-btn {
            background: #f1f5f9;
            color: #64748b;
            border: none;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.35rem;
            cursor: pointer;
            transition: all 0.3s ease;
            flex-shrink: 0;
        }

        .delete-btn:hover {
            background: #fee2e2;
            color: #ef4444;
            transform: scale(1.1);
        }

        .empty-state {
            text-align: center;
            padding: 3rem 1.5rem;
            color: #64748b;
        }

        footer {
            text-align: center;
            padding: 1.4rem 1rem;
            font-size: 0.9rem;
            color: #64748b;
            border-top: 1px solid #e2e8f0;
        }

        /* Scrollbar customizada */
        .task-list::-webkit-scrollbar {
            width: 6px;
        }
        .task-list::-webkit-scrollbar-thumb {
            background: #c1d0e0;
            border-radius: 20px;
        }

        /* ===================== MEDIA QUERIES ===================== */
        @media (min-width: 640px) {
            body {
                padding: 2rem 1rem;
            }

            .form-group {
                flex-direction: row;     /* volta para lado a lado em telas maiores */
                align-items: end;
            }

            select {
                min-width: 160px;
                width: auto;
            }

            .btn-add {
                width: auto;
                padding: 14px 32px;
                margin-top: 0;
            }

            header h1 {
                font-size: 2.2rem;
            }

            .task-list {
                padding: 1.2rem 2rem 2rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📋 Minhas Tarefas</h1>
            <p>Organize com prioridade • Projeto Faculdade</p>
        </header>

        <div class="form-container">
            <div class="form-group">
                <div class="input-wrapper">
                    <label for="task-input">Descrição da tarefa</label>
                    <input type="text" id="task-input" placeholder="Ex: Estudar para a prova de Matemática" autocomplete="off">
                </div>
                
                <div>
                    <label for="priority-select">Prioridade</label>
                    <select id="priority-select">
                        <option value="alta">🔴 Alta</option>
                        <option value="media" selected>🟠 Média</option>
                        <option value="baixa">🟢 Baixa</option>
                    </select>
                </div>

                <button id="add-btn" class="btn-add">+ Adicionar Tarefa</button>
            </div>
        </div>

        <ul id="task-list" class="task-list"></ul>

        <footer>
            Total de tarefas: <strong id="task-count">0</strong>
        </footer>
    </div>

    <script>
        // ==================== VARIÁVEIS GLOBAIS ====================
        let tasks = [];  // Array que armazena todas as tarefas

        // Seleção dos elementos do DOM (melhor performance ao selecionar uma única vez)
        const taskInput = document.getElementById('task-input');
        const prioritySelect = document.getElementById('priority-select');
        const addBtn = document.getElementById('add-btn');
        const taskList = document.getElementById('task-list');
        const taskCount = document.getElementById('task-count');

        // ==================== FUNÇÕES ====================

        /**
         * Salva o array de tarefas no localStorage do navegador
         * Permite que as tarefas permaneçam mesmo após fechar o navegador
         */
        function saveToLocalStorage() {
            localStorage.setItem('collegeTodoTasks', JSON.stringify(tasks));
        }

        /**
         * Carrega as tarefas salvas anteriormente do localStorage
         * Executada automaticamente quando a página é carregada
         */
        function loadFromLocalStorage() {
            const saved = localStorage.getItem('collegeTodoTasks');
            if (saved) {
                tasks = JSON.parse(saved);   // Converte a string JSON de volta para array
                renderTasks();               // Atualiza a interface com as tarefas carregadas
            }
        }

        /**
         * Renderiza (desenha) todas as tarefas na tela
         * Esta função é chamada sempre que há alguma alteração na lista
         */
        function renderTasks() {
            taskList.innerHTML = '';   // Limpa a lista antes de renderizar novamente

            // Verifica se não há tarefas cadastradas
            if (tasks.length === 0) {
                taskList.innerHTML = `
                    <div class="empty-state">
                        <p style="font-size: 2.5rem; margin-bottom: 1rem;">📭</p>
                        <p style="font-size: 1.2rem;">Nenhuma tarefa ainda...</p>
                        <p style="margin-top: 0.5rem;">Adicione sua primeira tarefa acima!</p>
                    </div>
                `;
                taskCount.textContent = '0';
                return;
            }

            // Percorre todas as tarefas e cria os elementos HTML
            tasks.forEach((task, index) => {
                const li = document.createElement('li');
                li.className = `task-item ${task.priority} ${task.done ? 'done' : ''}`;
                
                li.innerHTML = `
                    <input type="checkbox" class="done-checkbox" ${task.done ? 'checked' : ''}>
                    <span class="task-text">${task.text}</span>
                    <span class="priority-badge priority-${task.priority}">
                        ${task.priority === 'alta' ? 'Alta' : task.priority === 'media' ? 'Média' : 'Baixa'}
                    </span>
                    <button class="delete-btn" title="Excluir">🗑️</button>
                `;

                // Evento: Marcar tarefa como concluída
                li.querySelector('.done-checkbox').addEventListener('change', () => {
                    tasks[index].done = !tasks[index].done;  // Alterna entre feito/não feito
                    saveToLocalStorage();
                    renderTasks();   // Atualiza a tela
                });

                // Evento: Excluir tarefa
                li.querySelector('.delete-btn').addEventListener('click', () => {
                    if (confirm('Tem certeza que deseja excluir esta tarefa?')) {
                        tasks.splice(index, 1);   // Remove a tarefa do array
                        saveToLocalStorage();
                        renderTasks();
                    }
                });

                taskList.appendChild(li);
            });

            // Atualiza o contador no rodapé
            taskCount.textContent = tasks.length;
        }

        /**
         * Adiciona uma nova tarefa à lista
         * Valida se o campo não está vazio e cria o objeto da tarefa
         */
        function addTask() {
            const text = taskInput.value.trim();   // Remove espaços em branco
            
            // Validação: não permite adicionar tarefa vazia
            if (text === '') {
                taskInput.style.borderColor = '#ef4444';   // Feedback visual de erro
                setTimeout(() => taskInput.style.borderColor = '#e2e8f0', 800);
                taskInput.focus();
                return;
            }

            // Cria o objeto da nova tarefa e adiciona no início do array
            tasks.unshift({
                id: Date.now(),                    // ID único baseado no timestamp
                text: text,
                priority: prioritySelect.value,    // 'alta', 'media' ou 'baixa'
                done: false
            });

            saveToLocalStorage();
            renderTasks();

            // Limpa o campo de input após adicionar
            taskInput.value = '';

            // Feedback visual de sucesso no botão
            const originalText = addBtn.textContent;
            addBtn.textContent = '✅ Adicionado!';
            addBtn.style.backgroundColor = '#10b981';
            setTimeout(() => {
                addBtn.textContent = originalText;
                addBtn.style.backgroundColor = '';
            }, 1400);
        }

        // ==================== EVENTOS ====================

        // Clique no botão "Adicionar Tarefa"
        addBtn.addEventListener('click', addTask);

        // Pressionar Enter no campo de texto também adiciona a tarefa
        taskInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') addTask();
        });

        // Carrega as tarefas salvas quando a página termina de carregar
        window.addEventListener('load', loadFromLocalStorage);
    </script>
</body>
</html>
